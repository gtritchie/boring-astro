# lychee.toml
verbose = "info"
no_progress = true
retry_wait_time = 2
max_retries = 2
timeout = 20
max_concurrency = 8
skip_missing = false
include_fragments = true
root_dir = "dist/client"

# Only check links *in* the built site; ignore link-farm kind of pages.
include = [
  "dist/client/**/*.html",
]

# Don't spam third parties that rate-limit or require auth.
# Also: skip absolute same-site URLs PRE-LAUNCH. Canonical tags and the
# sitemap emit absolute https://boringbydesign.ca/... links; until DNS
# is live, those 404. Remove this last entry after F2 (first deploy)
# so first-party absolute URLs get verified. Tracked in the F2 handoff
# note's "Follow-ups to consider after launch".
exclude = [
  "^https?://(www\\.)?linkedin\\.com",
  "^https?://(www\\.)?twitter\\.com",
  "^https?://(www\\.)?x\\.com",
  "^https?://(www\\.)?openai\\.com",
  "^https?://(www\\.)?npmjs\\.com",
  "mailto:.*",
  "^https?://boringbydesign\\.ca",
]

# Honor robots.txt where hosts provide one
user_agent = "lychee/boringbydesign.ca"
