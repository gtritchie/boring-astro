# lychee.toml
verbose = "info"
no_progress = true
retry_wait_time = 2
max_retries = 2
timeout = 20
max_concurrency = 8
skip_missing = false
include_fragments = true
root_dir = "dist/client"

# Only check links *in* the built site; ignore link-farm kind of pages.
include = [
  "dist/client/**/*.html",
]

# Don't spam third parties that rate-limit or require auth.
# Skip absolute same-site URLs: canonical tags and the sitemap emit
# https://boringbydesign.ca/… absolute URLs, and any PR that introduces
# a new page would otherwise fail link-check (the new page exists only
# on prod after merge + deploy). Astro's build generates those URLs
# from the actual page set, so they're already validated structurally —
# lychee's contribution here is verifying external links and in-content
# links to removed pages.
exclude = [
  "^https?://(www\\.)?linkedin\\.com",
  "^https?://(www\\.)?twitter\\.com",
  "^https?://(www\\.)?x\\.com",
  "^https?://(www\\.)?openai\\.com",
  "^https?://(www\\.)?npmjs\\.com",
  "mailto:.*",
  "^https?://boringbydesign\\.ca",
]

# Honor robots.txt where hosts provide one
user_agent = "lychee/boringbydesign.ca"
