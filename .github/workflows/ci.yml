# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - run: npm ci

      - name: Lint, format, typecheck
        run: npm run check

      - name: Build
        env:
          PUBLIC_CF_WA_TOKEN: ${{ secrets.PUBLIC_CF_WA_TOKEN }}
        run: npm run build

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml 'dist/client/**/*.html'
          fail: true

      - name: Start preview
        run: npx astro preview --host 127.0.0.1 --port 4321 &

      - name: Wait for preview
        run: npx wait-on http://127.0.0.1:4321/ --timeout 60000

      - name: pa11y-ci (AAA, every URL in the sitemap index)
        run: npm run pa11y
