# .github/workflows/ci.yml
name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  build-and-check:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      # pa11y-ci pulls in puppeteer transitively, whose postinstall would
      # otherwise try to download Chrome. CI runs no browser, so skip it.
      # Scoped to CI only — local installs still download Chrome for
      # `npm run pa11y`.
      - name: Install dependencies
        run: npm ci
        env:
          PUPPETEER_SKIP_DOWNLOAD: "true"

      - name: Lint, format, typecheck
        run: npm run check

      - name: Build
        env:
          PUBLIC_CF_WA_TOKEN: ${{ secrets.PUBLIC_CF_WA_TOKEN }}
        run: npm run build

      - name: Link check
        uses: lycheeverse/lychee-action@v2
        with:
          args: --config lychee.toml 'dist/client/**/*.html'
          fail: true
